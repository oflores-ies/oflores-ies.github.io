<html>
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web d'Òscar</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
   <link rel="stylesheet" href="/styles.css"/>
</head>
<body data-bs-theme="light">
  <!-- Navbar -->
  <div id="nav-placeholder">

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const response = await fetch("/nav.html");
  const html = await response.text();
  document.getElementById("nav-placeholder").innerHTML = html;
});
</script>
  <main class="container py-5">
    <h1 class="display-5 fw-bold mb-4"> Results of pollution in Barcelona (Sants) graphically</h1>
   <h2 style="text-align: center; margin-top: 40px;">Research Visualizations</h2>

<div style="display: flex; flex-wrap: wrap; justify-content: space-around; gap: 20px; padding: 20px;">

  <div style="flex: 1; min-width: 300px; border: 1px solid #ddd; border-radius: 10px; padding: 15px; background: #f9f9f9;">
    <h4 style="margin-top: 0;">Air pollution in Barcelona-Sants (1994-2025)</h4>
    <img src="img/Rplot.png" alt="Air pollution in Barcelona-Sants" style="width: 100%; border-radius: 5px;">
  </div>

  <div style="flex: 1; min-width: 300px; border: 1px solid #ddd; border-radius: 10px; padding: 15px; background: #f9f9f9;">
    <h4 style="margin-top: 0;">Nitrogen dioxide evolution in Barcelona−Sants </h4>
    <img src="img/Rplot2.png" alt="Nitrogen dioxide evolution in Barcelona−Sants " style="width: 100%; border-radius: 5px;">
  

 
  </div> 
    
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Mode clar/fosc amb canvi d'icona
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');

    themeToggle.addEventListener('click', () => {
      if (document.body.getAttribute('data-bs-theme') === 'dark') {
        document.body.setAttribute('data-bs-theme', 'light');
        themeIcon.classList.remove('fa-sun');
        themeIcon.classList.add('fa-moon');
      } else {
        document.body.setAttribute('data-bs-theme', 'dark');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
      }
    });
  </script>
   </body>
</html>
